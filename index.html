<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rapha. | Suplementos, Zapatos y Ropa Deportiva</title>
  
  <!-- SEO & Social Media Meta Tags -->
  <meta name="description" content="Descubre en rapha. la mejor selección premium de suplementos, zapatos y ropa deportiva de alta calidad.">
  <meta name="keywords" content="rapha, suplementos, zapatos, ropa deportiva, fitness, venezuela">
  <meta name="theme-color" content="#ffffff">
  <meta property="og:title" content="rapha. | Sports & Supplements">
  <meta property="og:description" content="La mejor selección de suplementos, calzado y ropa deportiva premium.">
  <meta property="og:image" content="iconopag.png">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="iconopag.png">
  <link rel="apple-touch-icon" href="iconopag.png">

  <!-- Styles & Fonts -->
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Satisfy&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Aether Flow Canvas Background -->
  <canvas id="aether-canvas"></canvas>
  
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="logo logo-desktop">rapha.</div>
      <div class="header-top-row">
        <div class="logo logo-mobile">rapha.</div>
        <button class="cart-button cart-mobile">
          <span>Carrito</span>
          <span class="cart-count">0</span>
        </button>
      </div>
      <div class="search-container">
        <input type="text" class="search-input" id="search-input" placeholder="Buscar productos...">
        <button class="search-button" id="search-button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </button>
      </div>
      <button class="goal-calculator-btn" id="goal-calculator-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path>
        </svg>
        <span>Calculadora de Objetivos</span>
      </button>
      <nav class="nav-tabs">
        <button class="nav-tab" data-category="men">Hombres</button>
        <button class="nav-tab active" data-category="women">Mujeres</button>
        <button class="nav-tab" data-category="supplements">Suplementos</button>
        <button class="nav-tab" data-category="vitamins">Vitaminas</button>
      </nav>
      <button class="cart-button cart-desktop">
        <span>Carrito</span>
        <span class="cart-count">0</span>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <div class="container">
      <!-- Promotional Posters -->
      <section class="promotional-posters">
        <a href="#" class="poster-card">
          <img src="posters/poster1.png" alt="Promoción 1">
          <h3>Colección Exclusiva</h3>
        </a>
        <a href="#" class="poster-card">
          <img src="posters/poster2.png" alt="Promoción 2">
          <h3>Rendimiento Máximo</h3>
        </a>
        <a href="#" class="poster-card">
          <img src="posters/poster3.png" alt="Promoción 3">
          <h3>Alcanza tus Metas</h3>
        </a>
      </section>

      <div class="nike-layout">
        <!-- Sidebar Filters -->
        <aside class="sidebar-filters">
          <h3 class="sidebar-title" id="category-title">Mujeres</h3>
          
          <div class="filter-group">
            <h4 class="filter-group-title">Categorías</h4>
            <ul class="filter-list">
              <li><label><input type="checkbox" class="filter-checkbox" data-type="category" value="Tenis"> Zapatillas</label></li>
              <li><label><input type="checkbox" class="filter-checkbox" data-type="category" value="Ropa"> Ropa Deportiva</label></li>
            </ul>
          </div>
          
          <div class="filter-group">
            <h4 class="filter-group-title">Novedades</h4>
            <ul class="filter-list">
              <li><label><input type="checkbox" class="filter-checkbox" data-type="new" value="true"> Lo Nuevo</label></li>
            </ul>
          </div>
        </aside>

        <!-- Main Product Grid -->
        <div class="product-grid-container">
          <div class="products-grid" id="products-grid">
            <!-- Products will be rendered here -->
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Cart Sidebar -->
  <div class="cart-overlay" id="cart-overlay"></div>
  <aside class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
      <h2 class="cart-title">Tu Carrito</h2>
      <button class="cart-close" id="cart-close">&times;</button>
    </div>
    <div class="cart-items" id="cart-items">
      <!-- Cart items will be rendered here -->
    </div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Total</span>
        <span id="cart-total">$0.00</span>
      </div>
      <button class="cart-checkout-btn">Proceder al Pago</button>
    </div>
  </aside>

  <!-- Goal Calculator Modal -->
  <div class="calculator-overlay" id="calculator-overlay"></div>
  <div class="calculator-modal" id="calculator-modal">
    <div class="calculator-header">
      <h2 class="calculator-title">Calculadora de Objetivos</h2>
      <button class="calculator-close" id="calculator-close">&times;</button>
    </div>
    <div class="calculator-content" id="calculator-content">
      <!-- Calculator steps will be rendered here -->
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
